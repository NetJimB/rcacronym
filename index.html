<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RC Acronyms</title>
<style>
  :root{
    --bg: #000000;
    --fg: #ffffff;
    --sub: #9a9a9a;
    --card: #141414;
    --border: #2a2a2a;
    --accent: #cc1f2c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
    transition: background .2s ease, color .2s ease;
  }
  #app{ min-height:100vh; display:flex; flex-direction:column; }

  header{
    position:sticky; top:0; z-index:20;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 18px 16px 12px;
  }
  .header-top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 12px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .cross{
    width:22px; height:22px; position:relative; flex-shrink:0;
  }
  .cross::before, .cross::after{
    content:""; position:absolute; background: var(--accent);
  }
  .cross::before{ left:9px; top:0; width:4px; height:22px; }
  .cross::after{ top:9px; left:0; height:4px; width:22px; }
  h1{ font-size:17px; font-weight:700; letter-spacing:.2px; margin:0; }
  .sub{ font-size:11px; color:var(--sub); margin-top:1px; }

  .dots-btn{
    background:none; border:none; color:var(--fg); font-size:22px;
    padding:6px 10px; cursor:pointer; border-radius:8px; line-height:1;
  }
  .dots-btn:active{ background: var(--card); }

  main{ flex:1; padding: 14px 16px 40px; }

  .search-wrap{ position:relative; margin-bottom:0; display:flex; gap:8px; align-items:stretch; }
  .search-input-wrap{ position:relative; flex:1; min-width:0; }
  #search{
    width:100%; padding:14px 40px 14px 16px; font-size:16px;
    background: var(--card); color: var(--fg);
    border:1px solid var(--border); border-radius:12px;
    outline:none; box-sizing:border-box;
  }
  #search::placeholder{ color: var(--sub); }
  #search:focus{ border-color: var(--accent); }

  .clear-btn{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:50%; border:none;
    background:none; color:var(--sub); font-size:16px; cursor:pointer;
    display:none; align-items:center; justify-content:center; line-height:1;
  }
  .clear-btn.show{ display:flex; }
  .clear-btn:active{ background: rgba(128,128,128,.2); }

  .fav-filter{
    flex-shrink:0; width:48px; font-size:20px; cursor:pointer;
    background: var(--card); color: var(--sub);
    border:1px solid var(--border); border-radius:12px;
  }
  .fav-filter.active{ color: var(--accent); border-color: var(--accent); }

  .star-btn{
    background:none; border:none; font-size:18px; cursor:pointer;
    color: var(--sub); padding:0 2px; line-height:1;
  }
  .star-btn.on{ color: var(--accent); }

  .count{ font-size:12px; color:var(--sub); margin: 0 2px 10px; }
  #results{ padding-top:14px; }

  .entry{
    background: var(--card); border:1px solid var(--border);
    border-radius:12px; padding:14px 16px; margin-bottom:10px;
  }
  .entry-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .term{ font-size:16px; font-weight:700; letter-spacing:.3px; }
  .entry-actions{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
  .entry-actions-top{ display:flex; align-items:center; gap:10px; }
  .del, .edit-btn{ background:none; border:none; color:var(--sub); font-size:12px; cursor:pointer; padding:2px 4px; }
  .edit-btn{ color: var(--accent); }
  .def{ font-size:14px; color: var(--fg); opacity:.92; margin-top:6px; line-height:1.4; }
  .links{ margin-top:8px; display:flex; flex-wrap:wrap; gap:8px; }
  .links a{ font-size:12.5px; color: var(--accent); text-decoration:none; border-bottom:1px solid currentColor; }

  .empty{ text-align:center; color:var(--sub); padding: 60px 20px; font-size:14px; line-height:1.5; }

  /* Add button */
  .fab{
    position:fixed; right:18px; bottom:24px; z-index:15;
    width:52px; height:52px; border-radius:50%;
    background: var(--accent); color:#fff; border:none;
    font-size:26px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.4);
    display:none; align-items:center; justify-content:center;
  }

  /* Settings sheet */
  .overlay{
    position:fixed; inset:0; background: rgba(0,0,0,.55);
    z-index:30; display:none;
  }
  .overlay.show{ display:block; }
  .sheet{
    position:fixed; right:10px; top:56px; z-index:31;
    background: var(--card); border:1px solid var(--border);
    border-radius:14px; width: 240px; overflow:hidden;
    transform: translateY(-8px); opacity:0; pointer-events:none;
    transition: all .15s ease;
  }
  .sheet.show{ transform: translateY(0); opacity:1; pointer-events:auto; }
  .sheet-title{ font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--sub); padding:12px 14px 4px; }
  .theme-opt{
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; cursor:pointer; border-top:1px solid var(--border);
  }
  .theme-opt:active{ background: rgba(255,255,255,.06); }
  .swatch{ width:22px; height:22px; border-radius:6px; border:1px solid rgba(255,255,255,.25); flex-shrink:0; }
  .theme-name{ font-size:14px; }
  .theme-check{ margin-left:auto; font-size:14px; color: var(--accent); visibility:hidden; }
  .theme-opt.active .theme-check{ visibility:visible; }
  .app-version{
    text-align:center; font-size:11px; color:var(--sub);
    padding:14px 14px 18px; border-top:1px solid var(--border); margin-top:4px;
  }

  /* Add entry modal */
  .modal-overlay{
    position:fixed; inset:0; background: rgba(0,0,0,.65);
    z-index:40; display:none; align-items:flex-end;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background: var(--card); width:100%; border-radius:18px 18px 0 0;
    padding: 18px 18px 26px; border-top:1px solid var(--border);
    max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    box-sizing: border-box;
  }
  .modal h2{ font-size:16px; margin:0 0 14px; }
  .field-label{ font-size:12px; color:var(--sub); margin: 12px 0 6px; }
  .field-label:first-of-type{ margin-top:0; }
  .modal input, .modal textarea{
    width:100%; background: var(--bg); color: var(--fg);
    border:1px solid var(--border); border-radius:10px;
    padding:11px 12px; font-size:15px; font-family:inherit; outline:none;
  }
  .modal textarea{ resize:vertical; min-height:60px; }
  .modal input:focus, .modal textarea:focus{ border-color: var(--accent); }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .btn{ flex:1; padding:12px; border-radius:10px; border:none; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-cancel{ background: transparent; color: var(--sub); border:1px solid var(--border); }
  .btn-save{ background: var(--accent); color:#fff; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="cross"></div>
        <div>
          <h1>RC Acronyms</h1>
          <div class="sub" id="entryCountLabel">loading…</div>
        </div>
      </div>
      <button class="dots-btn" id="dotsBtn" aria-label="Settings">⋯</button>
    </div>
    <div class="search-wrap">
      <div class="search-input-wrap">
        <input id="search" type="text" placeholder="Search acronym or definition… (comma to search multiple)" autocomplete="off" />
        <button class="clear-btn" id="clearBtn" aria-label="Clear search">✕</button>
      </div>
      <button class="fav-filter" id="favFilter" aria-label="Show favorites only">☆</button>
    </div>
  </header>

  <main>
    <div id="results"></div>
  </main>

  <button class="fab" id="addBtn" aria-label="Add entry">+</button>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-title">Background</div>
  <div class="theme-opt" data-theme="black">
    <div class="swatch" style="background:#000;"></div>
    <div class="theme-name" style="color:#fff;">Black / White</div>
    <div class="theme-check">✓</div>
  </div>
  <div class="theme-opt" data-theme="blue">
    <div class="swatch" style="background:#0b3d91;"></div>
    <div class="theme-name" style="color:#e6e6e6;">Blue / Yellow</div>
    <div class="theme-check">✓</div>
  </div>
  <div class="theme-opt" data-theme="white">
    <div class="swatch" style="background:#fff; border-color:#ccc;"></div>
    <div class="theme-name" style="color:#e6e6e6;">White / Black</div>
    <div class="theme-check">✓</div>
  </div>
  <div class="sheet-title" style="border-top:1px solid var(--border); margin-top:4px; padding-top:12px;">Admin</div>
  <div class="theme-opt" id="adminRow">
    <div class="theme-name" id="adminRowLabel" style="color:#fff;">Log in as Admin</div>
  </div>
  <div class="app-version">v1.0.0</div>
</div>

<div class="modal-overlay" id="loginModalOverlay">
  <div class="modal">
    <h2>Admin login</h2>
    <div class="field-label">Password</div>
    <input id="fPassword" type="password" placeholder="Password" autocomplete="off" />
    <div class="modal-actions">
      <button class="btn btn-cancel" id="loginCancelBtn">Cancel</button>
      <button class="btn btn-save" id="loginSaveBtn">Log in</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add acronym</h2>
    <div class="field-label">Acronym</div>
    <input id="fTerm" type="text" placeholder="e.g. RC" />
    <div class="field-label">Definition</div>
    <textarea id="fDef" placeholder="e.g. Red Cross"></textarea>
    <div class="field-label">Link (optional)</div>
    <input id="fLink" type="text" placeholder="https://…" />
    <div class="modal-actions">
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn btn-save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
const THEMES = {
  black: { bg:'#000000', fg:'#ffffff', sub:'#9a9a9a', card:'#141414', border:'#2a2a2a', accent:'#cc1f2c' },
  blue:  { bg:'#0b2e6e', fg:'#ffe14d', sub:'#bcd0ff', card:'#0f3a8c', border:'#1d4faa', accent:'#ffe14d' },
  white: { bg:'#ffffff', fg:'#000000', sub:'#666666', card:'#f2f2f2', border:'#dddddd', accent:'#b3121c' }
};

const SEED = [
  { term:'RC', def:'Red Cross', links:[], fav:false },
  { term:'ARC', def:'American Red Cross', links:['https://www.redcross.org'], fav:false },
  { term:'ICRC', def:'International Committee of the Red Cross', links:['https://www.icrc.org'], fav:false },
  { term:'IFRC', def:'International Federation of Red Cross and Red Crescent Societies', links:['https://www.ifrc.org'], fav:false },
  { term:'DAT', def:'Disaster Action Team', links:[], fav:false }
];

// Researched from redcross.org, icrc.org, ifrc.org and Red Cross training/guideline sources.
const WEB_ADDITIONS = [
  { term:'ERV', def:'Emergency Response Vehicle — mobile unit that delivers food, relief supplies, and comfort to communities after a disaster', links:['https://www.redcross.org/about-us/our-work/disaster-relief.html'] },
  { term:'ERU', def:'Emergency Response Unit — a standardized IFRC disaster relief team deployed when local infrastructure is damaged or overwhelmed', links:['https://www.ifrc.org'] },
  { term:'DSHR', def:'Disaster Services Human Resources — the national system of trained volunteers deployed to large-scale disasters', links:[] },
  { term:'AFES', def:'Armed Forces Emergency Services — Red Cross support connecting military members and their families during emergencies', links:['https://www.redcross.org'] },
  { term:'BHQ', def:'Biomedical Services Headquarters — the division overseeing Red Cross blood collection and services', links:[] },
  { term:'ADGP', def:'Annual Disaster Giving Program — recurring corporate/donor program that funds year-round disaster response readiness', links:[] },
  { term:'CPR', def:'Cardiopulmonary Resuscitation — chest compressions and rescue breaths used to keep blood and oxygen moving during cardiac arrest', links:[] },
  { term:'AED', def:'Automated External Defibrillator — a portable device that can shock the heart back into a normal rhythm', links:[] },
  { term:'BLS', def:'Basic Life Support — foundational emergency care skills including CPR, used before advanced medical help arrives', links:[] },
  { term:'ALS', def:'Advanced Life Support — higher-level emergency medical care, typically provided by paramedics', links:[] },
  { term:'BVM', def:'Bag-Valve-Mask — a hand-held device used to manually ventilate a person who isn\u2019t breathing adequately', links:[] }
];

let entries = [];
let currentTheme = 'black';
let favOnly = false;
let isAdmin = false;
const ADMIN_PASSWORD = 'admin'; // client-side only — not real security, swap out before real deployment

const el = (id) => document.getElementById(id);
const root = document.documentElement;

function applyTheme(name){
  const t = THEMES[name] || THEMES.black;
  root.style.setProperty('--bg', t.bg);
  root.style.setProperty('--fg', t.fg);
  root.style.setProperty('--sub', t.sub);
  root.style.setProperty('--card', t.card);
  root.style.setProperty('--border', t.border);
  root.style.setProperty('--accent', t.accent);
  document.querySelectorAll('.theme-opt[data-theme]').forEach(o=>{
    o.classList.toggle('active', o.dataset.theme === name);
  });
}

function normalize(s){
  return (s||'').toLowerCase().replace(/[\s.\-]/g,'');
}
function normalizeText(s){
  return (s||'').toLowerCase().trim().replace(/\s+/g,' ');
}

function render(){
  const rawQuery = el('search').value;
  const queries = rawQuery.split(',').map(s=>s.trim()).filter(Boolean);
  const qTerms = queries.map(q=>normalize(q));
  const qTexts = queries.map(q=>normalizeText(q));
  let list = entries.filter(e=>{
    if (favOnly && !e.fav) return false;
    if (queries.length === 0) return true;
    const term = normalize(e.term);
    const def = normalizeText(e.def);
    return queries.some((_, i) => term.includes(qTerms[i]) || def.includes(qTexts[i]));
  });
  list = list.sort((a,b)=>{
    if (!!b.fav !== !!a.fav) return (b.fav?1:0) - (a.fav?1:0);
    if (queries.length === 0) return 0;
    const at = normalize(a.term), bt = normalize(b.term);
    const scoreFor = (t) => {
      let best = 3;
      qTerms.forEach(q=>{
        const s = t === q ? 0 : t.startsWith(q) ? 1 : t.includes(q) ? 2 : 3;
        if (s < best) best = s;
      });
      return best;
    };
    return scoreFor(at) - scoreFor(bt);
  });

  el('entryCountLabel').textContent = entries.length + (entries.length===1 ? ' entry' : ' entries');
  el('favFilter').classList.toggle('active', favOnly);
  el('clearBtn').classList.toggle('show', rawQuery.length > 0);
  el('favFilter').textContent = favOnly ? '★' : '☆';

  const container = el('results');
  container.innerHTML = '';

  if (entries.length === 0){
    container.innerHTML = '<div class="empty">No acronyms yet.<br>Tap + to add your first entry.</div>';
    return;
  }
  if (list.length === 0){
    container.innerHTML = favOnly
      ? '<div class="empty">No favorites yet.<br>Tap the star on an entry to save it here.</div>'
      : '<div class="empty">No matches for "' + escapeHtml(el('search').value) + '"</div>';
    return;
  }

  list.forEach((e)=>{
    const realIdx = entries.indexOf(e);
    const card = document.createElement('div');
    card.className = 'entry';
    const linksHtml = (e.links||[]).filter(Boolean).map(l=>
      `<a href="${escapeAttr(l)}" target="_blank" rel="noopener">${escapeHtml(l)}</a>`
    ).join('');
    card.innerHTML = `
      <div class="entry-top">
        <div class="term">${escapeHtml(e.term)}</div>
        <div class="entry-actions">
          <div class="entry-actions-top">
            <button class="star-btn ${e.fav ? 'on' : ''}" data-idx="${realIdx}" aria-label="Toggle favorite">${e.fav ? '★' : '☆'}</button>
            ${isAdmin ? `<button class="del" data-idx="${realIdx}">remove</button>` : ''}
          </div>
          ${isAdmin ? `<button class="edit-btn" data-idx="${realIdx}">edit</button>` : ''}
        </div>
      </div>
      <div class="def">${escapeHtml(e.def)}</div>
      ${linksHtml ? `<div class="links">${linksHtml}</div>` : ''}
    `;
    container.appendChild(card);
  });

  el('addBtn').style.display = isAdmin ? 'flex' : 'none';

  container.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', async (ev)=>{
      const i = parseInt(ev.target.dataset.idx, 10);
      const removed = entries[i];
      if (removed) removedTerms.add(normalize(removed.term));
      entries.splice(i,1);
      await Promise.all([persistEntries(), persistRemovedTerms()]);
      render();
    });
  });

  container.querySelectorAll('.star-btn').forEach(btn=>{
    btn.addEventListener('click', async (ev)=>{
      const i = parseInt(ev.target.dataset.idx, 10);
      entries[i].fav = !entries[i].fav;
      entries[i].src = 'user'; // promote so the favorite survives future loads
      await persistEntries();
      render();
    });
  });

  container.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = parseInt(btn.dataset.idx, 10);
      openEditModal(i);
    });
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

let removedTerms = new Set();

function persistEntries(){
  try{
    const userOwned = entries.filter(e => e.src === 'user');
    localStorage.setItem('rc-acronym-user-entries', JSON.stringify(userOwned));
  }catch(err){
    // e.g. private browsing mode with storage disabled — app keeps working in-memory.
  }
}
function persistRemovedTerms(){
  try{
    localStorage.setItem('rc-acronym-removed-terms', JSON.stringify([...removedTerms]));
  }catch(err){ /* non-fatal */ }
}
function persistTheme(name){
  try{
    localStorage.setItem('rc-acronym-theme', name);
  }catch(err){ /* non-fatal */ }
}

function loadData(){
  let userEntries = null;
  let hadStoredUserEntries = false;

  try{
    const raw = localStorage.getItem('rc-acronym-user-entries');
    if (raw){ userEntries = JSON.parse(raw); hadStoredUserEntries = true; }
  }catch(err){ /* key doesn't exist yet, or storage unavailable — fine */ }

  if (userEntries === null){
    // First run: seed with the starter set + web-researched additions.
    userEntries = SEED.concat(WEB_ADDITIONS.map(a=>({ term:a.term, def:a.def, links:a.links||[], fav:false })));
  }
  userEntries.forEach(e => { e.src = 'user'; if (e.fav === undefined) e.fav = false; if (!e.links) e.links = []; });

  try{
    const raw = localStorage.getItem('rc-acronym-removed-terms');
    if (raw) removedTerms = new Set(JSON.parse(raw));
  }catch(err){ removedTerms = new Set(); }

  const userTerms = new Set(userEntries.map(e=>normalize(e.term)));

  // Merge in the large reference document — kept purely in-memory, never written to storage.
  let docEntries = [];
  const dataEl = document.getElementById('doc-batch-data');
  if (dataEl){
    try{
      const raw = JSON.parse(dataEl.textContent);
      docEntries = raw
        .filter(a => !userTerms.has(normalize(a.term)) && !removedTerms.has(normalize(a.term)))
        .map(a => ({ term:a.term, def:a.def, links:[], fav:false, src:'doc' }));
    }catch(e){ docEntries = []; }
  }

  entries = userEntries.concat(docEntries);

  // Persist the starter seed on very first run so favorites/edits on it aren't lost.
  if (!hadStoredUserEntries){
    persistEntries();
  }

  try{
    currentTheme = localStorage.getItem('rc-acronym-theme') || 'black';
  }catch(err){
    currentTheme = 'black';
  }
  applyTheme(currentTheme);
  render();
}

// Settings sheet
el('dotsBtn').addEventListener('click', ()=>{
  el('overlay').classList.add('show');
  el('sheet').classList.add('show');
});
function closeSheet(){
  el('overlay').classList.remove('show');
  el('sheet').classList.remove('show');
}
el('overlay').addEventListener('click', closeSheet);
document.querySelectorAll('.theme-opt[data-theme]').forEach(opt=>{
  opt.addEventListener('click', async ()=>{
    currentTheme = opt.dataset.theme;
    applyTheme(currentTheme);
    await persistTheme(currentTheme);
    closeSheet();
  });
});

// Search
el('search').addEventListener('input', render);
el('clearBtn').addEventListener('click', ()=>{
  el('search').value = '';
  el('search').focus();
  render();
});

// Favorites filter
el('favFilter').addEventListener('click', ()=>{
  favOnly = !favOnly;
  render();
});

// Add / edit entry modal
let editingIndex = null;

function openAddModal(){
  editingIndex = null;
  el('modalTitle').textContent = 'Add acronym';
  el('fTerm').value = '';
  el('fDef').value = '';
  el('fLink').value = '';
  el('modalOverlay').classList.add('show');
  setTimeout(()=>el('fTerm').focus(), 50);
}

function openEditModal(idx){
  const e = entries[idx];
  if (!e) return;
  editingIndex = idx;
  el('modalTitle').textContent = 'Edit acronym';
  el('fTerm').value = e.term || '';
  el('fDef').value = e.def || '';
  el('fLink').value = (e.links && e.links[0]) || '';
  el('modalOverlay').classList.add('show');
  setTimeout(()=>el('fTerm').focus(), 50);
}

el('addBtn').addEventListener('click', openAddModal);
el('cancelBtn').addEventListener('click', ()=>{
  el('modalOverlay').classList.remove('show');
});
el('modalOverlay').addEventListener('click', (e)=>{
  if (e.target === el('modalOverlay')) el('modalOverlay').classList.remove('show');
});
el('saveBtn').addEventListener('click', async ()=>{
  const term = el('fTerm').value.trim();
  const def = el('fDef').value.trim();
  const link = el('fLink').value.trim();
  if (!term || !def) return;

  const wasAdd = editingIndex === null;
  if (editingIndex !== null && entries[editingIndex]){
    const existing = entries[editingIndex];
    existing.term = term;
    existing.def = def;
    existing.links = link ? [link] : [];
    existing.src = 'user'; // promote so edits to a document-sourced entry are saved
  } else {
    entries.push({ term, def, links: link ? [link] : [], fav: false, src: 'user' });
  }

  await persistEntries();
  el('modalOverlay').classList.remove('show');
  editingIndex = null;
  if (wasAdd) el('search').value = '';
  render();
});

// Admin login
function updateAdminRow(){
  el('adminRowLabel').textContent = isAdmin ? 'Log out (Admin)' : 'Log in as Admin';
}
el('adminRow').addEventListener('click', ()=>{
  closeSheet();
  if (isAdmin){
    isAdmin = false;
    updateAdminRow();
    render();
  } else {
    el('fPassword').value = '';
    el('loginModalOverlay').classList.add('show');
    setTimeout(()=>el('fPassword').focus(), 50);
  }
});
el('loginCancelBtn').addEventListener('click', ()=>{
  el('loginModalOverlay').classList.remove('show');
});
el('loginModalOverlay').addEventListener('click', (e)=>{
  if (e.target === el('loginModalOverlay')) el('loginModalOverlay').classList.remove('show');
});
function attemptLogin(){
  const pw = el('fPassword').value;
  if (pw === ADMIN_PASSWORD){
    isAdmin = true;
    el('loginModalOverlay').classList.remove('show');
    updateAdminRow();
    render();
  } else {
    el('fPassword').style.borderColor = '#cc1f2c';
    el('fPassword').value = '';
    el('fPassword').placeholder = 'Incorrect password';
    setTimeout(()=>{ el('fPassword').style.borderColor = ''; }, 1200);
  }
}
el('loginSaveBtn').addEventListener('click', attemptLogin);
el('fPassword').addEventListener('keydown', (e)=>{
  if (e.key === 'Enter') attemptLogin();
});
updateAdminRow();

loadData();
</script>
</body>
</html>
